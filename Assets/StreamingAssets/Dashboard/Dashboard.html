<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>VR Sim Dashboard</title>
<style>
  html, body { margin:0; padding:0; height:100%; background:#07090d; overflow:hidden;
    font-family:"Helvetica Neue", Helvetica, Arial, sans-serif; color:#fff; }
  #dash { width:100vw; height:100vh; position:relative; overflow:hidden; }
  .sig { position:absolute; display:flex; align-items:center; justify-content:center;
    width:78px; height:52px; transition:filter 80ms; }
  .sig svg { transition: fill 60ms linear; }
  .speed-wrap { position:absolute; top:calc(50% - 50px); left:50%; transform:translateX(-50%);
    text-align:center; width:58%; max-width:460px; }
  .rpm-num { font-size:6vh; font-weight:700; letter-spacing:2px; font-variant-numeric:tabular-nums;
    color:rgba(255,255,255,0.6); margin-bottom:8px; transition:color 80ms, text-shadow 80ms; }
  .speed-row { position:relative; height:15vh; display:flex; align-items:center; justify-content:center; }
  .speed { font-size:17vh; font-weight:600; line-height:0.9; letter-spacing:-0.03em;
    font-variant-numeric:tabular-nums; color:#fff; text-align:right; min-width:26vh; }
  .kmh { position:absolute; left:50%; margin-left:15vh; font-size:2vh; font-weight:700;
    letter-spacing:2px; color:rgba(255,255,255,0.6); text-transform:uppercase; white-space:nowrap; line-height:1; }
  .rpm-label { position:absolute; left:50%; transform:translateX(-50%);
    bottom:6%;
    font-size:1.8vh; font-weight:700; letter-spacing:5px; color:rgba(255,255,255,0.6);
    text-transform:uppercase; white-space:nowrap; }
  .gear-col { position:absolute; right:5%; top:50%; transform:translateY(-50%);
    display:flex; flex-direction:column; align-items:center; gap:8px; }
  .gear-label { font-size:1.3vh; font-weight:600; letter-spacing:3px; color:rgba(255,255,255,0.6); }
  .gear-badge { width:13vh; height:13vh; border-radius:14px; background:#00d4ff; color:#07090d;
    display:flex; align-items:center; justify-content:center; font-size:9vh; font-weight:700; line-height:1;
    box-shadow:0 0 24px rgba(0,212,255,0.27); }
  .prnd { display:flex; gap:6px; margin-top:4px; }
  .prnd span { font-size:1.5vh; font-weight:700; letter-spacing:1px; color:rgba(255,255,255,0.3);
    transition:color 120ms; }
  .prnd span.on { color:#00d4ff; }
  svg.arc { position:absolute; top:6%; left:50%; transform:translateX(-50%);
    height:88%; aspect-ratio: 760 / 360; pointer-events:none; }
</style>
</head>
<body>
<div id="dash">
  <div class="sig" id="sigL" style="top:3%;left:3%"></div>
  <div class="sig" id="sigR" style="top:3%;right:3%"></div>

  <svg class="arc" viewBox="0 0 760 360" preserveAspectRatio="xMidYMid meet">
    <path id="arcBg" fill="none" stroke="rgba(255,255,255,0.14)" stroke-width="4" stroke-linecap="round"/>
    <path id="arcRedBg" fill="none" stroke="rgba(255,61,61,0.25)" stroke-width="4" stroke-linecap="round"/>
    <path id="arcFill" fill="none" stroke="#00d4ff" stroke-width="6" stroke-linecap="round"
      style="transition:stroke 80ms linear"/>
    <g id="ticks"></g>
    <g id="minorTicks"></g>
    <!-- "× 1000 RPM" pinned to the arc's baseline (y=290 = cy), centered between tick 0 (left) and tick 8 (right). Inside the SVG so it scales + stays on the arc plane regardless of viewport. -->
    <text x="380" y="290" text-anchor="middle" dominant-baseline="middle"
      fill="rgba(255,255,255,0.6)" font-size="20" font-weight="700"
      letter-spacing="5" style="text-transform:uppercase">× 1000 RPM</text>
  </svg>

  <div class="speed-wrap">
    <div class="rpm-num" id="rpmNum">800</div>
    <div class="speed-row">
      <div class="speed" id="speed">00</div>
      <div class="kmh">KM / H</div>
    </div>
  </div>

  <div class="gear-col">
    <div class="gear-label">GEAR</div>
    <div class="gear-badge" id="gearBadge">D</div>
    <div class="prnd" id="prnd">
      <span data-g="P">P</span><span data-g="R">R</span><span data-g="N">N</span><span data-g="D">D</span>
    </div>
  </div>
</div>

<script>
// ============================================================================
// VR Sim Dashboard — Unity-ready single-file build.
//
// External API (call from Unity WebView / postMessage):
//   window.Dashboard.set({ speed, rpm, gear, signalL, signalR })
//     - speed: km/h  (number)
//     - rpm:   0..8000 (number)
//     - gear:  'P' | 'R' | 'N' | 'D' (string)
//     - signalL / signalR: boolean
//   All fields optional; only provided keys update.
//
// Also accepts window.postMessage({type:'dashboard', ...}) from Unity.
// Standalone demo: keyboard controls W/S, A/D, P/R/N/⇧D (remove if not needed).
// ============================================================================
(() => {
  const CX = 380, CY = 290, R = 232;
  const pt = (deg, rad) => { const rr = deg * Math.PI / 180;
    return [CX + Math.cos(rr) * rad, CY + Math.sin(rr) * rad]; };
  const arcPath = (a0, a1, rad) => {
    const [x0, y0] = pt(a0, rad), [x1, y1] = pt(a1, rad);
    const large = Math.abs(a1 - a0) > 180 ? 1 : 0;
    const sweep = a1 > a0 ? 1 : 0;
    return `M ${x0} ${y0} A ${rad} ${rad} 0 ${large} ${sweep} ${x1} ${y1}`;
  };
  const REDLINE = 6500;

  // Static SVG setup
  document.getElementById('arcBg').setAttribute('d', arcPath(-180, 0, R));
  document.getElementById('arcRedBg').setAttribute('d', arcPath(-180 + (REDLINE/8000)*180, 0, R));

  const ticksG = document.getElementById('ticks');
  for (let i = 0; i <= 8; i++) {
    const angle = -180 + (i / 8) * 180;
    const [x1, y1] = pt(angle, R - 14), [x2, y2] = pt(angle, R + 4);
    const [tx, ty] = pt(angle, R + 22);
    const red = i >= 6.5;
    ticksG.insertAdjacentHTML('beforeend',
      `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${red?'#ff6b6b':'#fff'}" stroke-width="2" stroke-linecap="round"/>
       <text x="${tx}" y="${ty}" text-anchor="middle" dominant-baseline="middle" fill="${red?'#ff6b6b':'rgba(255,255,255,0.85)'}" font-size="15" font-weight="600">${i}</text>`);
  }
  const minorG = document.getElementById('minorTicks');
  for (let i = 0; i < 40; i++) {
    if (i % 5 === 0) continue;
    const angle = -180 + (i / 40) * 180;
    const [x1, y1] = pt(angle, R - 7), [x2, y2] = pt(angle, R);
    minorG.insertAdjacentHTML('beforeend',
      `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="rgba(255,255,255,0.25)" stroke-width="1.2" stroke-linecap="round"/>`);
  }

  // Turn-signal SVGs (green, blinking via JS interval)
  const SIG_L = '<path d="M22 2 L22 8 L34 8 L34 16 L22 16 L22 22 L2 12 Z"/>';
  const SIG_R = '<path d="M14 2 L14 8 L2 8 L2 16 L14 16 L14 22 L34 12 Z"/>';
  for (const [id, d] of [['sigL', SIG_L], ['sigR', SIG_R]]) {
    document.getElementById(id).innerHTML =
      `<svg width="72" height="46" viewBox="0 0 36 24" fill="rgba(255,255,255,0.12)">${d}</svg>`;
  }

  // Live element refs
  const el = {
    speed: document.getElementById('speed'),
    rpmNum: document.getElementById('rpmNum'),
    gearBadge: document.getElementById('gearBadge'),
    prnd: document.getElementById('prnd'),
    arcFill: document.getElementById('arcFill'),
    sigL: document.getElementById('sigL'),
    sigR: document.getElementById('sigR'),
  };

  let state = { speed: 0, rpm: 800, gear: 'D', signalL: false, signalR: false };
  let blinkL = false, blinkR = false;
  setInterval(() => {
    blinkL = !blinkL; blinkR = !blinkR;
    paintSignals();
  }, 420);

  function paintSignals() {
    for (const [side, id, svgD, blink] of [
      ['L', 'sigL', SIG_L, blinkL],
      ['R', 'sigR', SIG_R, blinkR],
    ]) {
      const on = (side === 'L' ? state.signalL : state.signalR) && blink;
      const host = el[side === 'L' ? 'sigL' : 'sigR'];
      const svg = host.querySelector('svg');
      svg.setAttribute('fill', on ? '#2aff6b' : 'rgba(255,255,255,0.12)');
      host.style.filter = on
        ? 'drop-shadow(0 0 14px #2aff6b) drop-shadow(0 0 4px #2aff6b)' : 'none';
    }
  }

  function render() {
    const { speed, rpm, gear, signalL, signalR } = state;
    const rpmPct = Math.min(1, rpm / 8000);
    const isRed = rpm > REDLINE;

    el.speed.textContent = Math.round(speed).toString().padStart(2, '0');
    el.rpmNum.textContent = Math.round(rpm).toLocaleString();
    el.rpmNum.style.color = isRed ? '#ff3d3d' : 'rgba(255,255,255,0.6)';
    el.rpmNum.style.textShadow = isRed ? '0 0 12px rgba(255,61,61,0.8)' : 'none';

    const a1 = -180 + rpmPct * 180;
    if (rpmPct > 0.001) {
      el.arcFill.setAttribute('d', arcPath(-180, a1, R));
      el.arcFill.setAttribute('stroke', isRed ? '#ff3d3d' : '#00d4ff');
      el.arcFill.style.filter = isRed
        ? 'drop-shadow(0 0 10px #ff3d3ddd)'
        : 'drop-shadow(0 0 6px #00d4ffaa)';
    } else {
      el.arcFill.setAttribute('d', '');
    }

    el.gearBadge.textContent = gear;
    for (const s of el.prnd.querySelectorAll('span')) {
      s.classList.toggle('on', s.dataset.g === gear);
    }
    paintSignals();
  }

  // =========================================================================
  // Public API
  // =========================================================================
  window.Dashboard = {
    set(patch) {
      if (!patch) return;
      for (const k of ['speed','rpm','gear','signalL','signalR']) {
        if (patch[k] !== undefined) state[k] = patch[k];
      }
      render();
    },
    get: () => ({ ...state }),
  };

  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'dashboard') window.Dashboard.set(e.data);
  });

  render();

  // =========================================================================
  // Demo mode — self-contained sim so the file works standalone.
  // Delete this whole block once Unity is driving the dashboard.
  // =========================================================================
  const DEMO = false;
  if (DEMO) {
    const keys = {};
    let subGear = 1, last = performance.now();
    addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase(); keys[k] = true;
      if (k === 'a') state.signalL = !state.signalL, state.signalR = false;
      else if (k === 'd' && e.shiftKey) state.gear = 'D';
      else if (k === 'd') state.signalR = !state.signalR, state.signalL = false;
      if (k === 'p') state.gear = 'P';
      if (k === 'r') state.gear = 'R';
      if (k === 'n') state.gear = 'N';
    });
    addEventListener('keyup', (e) => { keys[e.key.toLowerCase()] = false; });

    const ratio = {1:45,2:24,3:14,4:11,5:8.5,6:7};
    function tick(t) {
      const dt = Math.min(0.05, (t - last) / 1000); last = t;
      const thr = keys['w'] || keys['arrowup'] ? 1 : 0;
      const brk = keys['s'] || keys['arrowdown'] ? 1 : 0;
      let { speed, gear } = state;
      if (gear === 'P') speed = 0;
      else if (gear === 'N') { speed -= Math.sign(speed) * 8 * dt; if (Math.abs(speed) < 0.5) speed = 0; }
      else if (gear === 'R') { speed += (thr ? -30 : 10) * dt; if (brk) speed += 80 * dt; speed = Math.max(-30, Math.min(0, speed)); }
      else { speed += (thr ? (55 - speed*0.15) : -8) * dt; if (brk) speed = Math.max(0, speed - 80*dt); speed = Math.max(0, Math.min(260, speed)); }
      const boost = thr ? 1 : 0.45;
      if (gear === 'D') {
        if (speed > 150*boost && subGear === 1) subGear = 2;
        else if (speed > 270*boost && subGear === 2) subGear = 3;
        else if (!thr && subGear === 3 && speed > 110) subGear = 4;
        else if (!thr && subGear === 4 && speed > 150) subGear = 5;
        else if (!thr && subGear === 5 && speed > 200) subGear = 6;
        if (speed < 30 && subGear === 2) subGear = 1;
        else if (speed < 55 && subGear === 3) subGear = 2;
        else if (speed < 95 && subGear === 4) subGear = 3;
        else if (speed < 135 && subGear === 5) subGear = 4;
        else if (speed < 180 && subGear === 6) subGear = 5;
      }
      let rpm;
      if (gear === 'P' || gear === 'N') rpm = 800 + thr * 3000;
      else if (gear === 'R') rpm = 800 + Math.abs(speed) * 35 + thr * 400;
      else rpm = 800 + Math.abs(speed) * ratio[subGear] + thr * 500;
      state.speed = Math.abs(speed); state.rpm = Math.min(8000, rpm);
      render();
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  }
})();
</script>
</body>
</html>
